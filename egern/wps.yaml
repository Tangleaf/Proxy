name: WPS 签到与 Cookie 获取
description: WPS 每日自动签到及 Cookie 获取模块。支持自定义签到时间及脚本响应等待时间。

compat_arguments:
  WPSCookie: 'true'
  WPSCron: 0 10 * * *
  FetchTimeout: '55'

compat_arguments_schema:
  WPSCookie:
    name: '[开关] WPS 获取 Cookie'
    description: 成功获取 Cookie 后可以关闭此修改以节省资源
    default_value: 'true'
    options:
      - 'true'
      - 'false'

  WPSCron:
    name: '[定时] WPS 签到时间'
    description: 可手动更改 WPS 脚本运行时间，例如 0 10 * * * 表示每天 10:00
    default_value: 0 10 * * *

  FetchTimeout:
    name: '[设置] 脚本响应超时(秒)'
    description: 设置脚本等待时长，防止网络延迟导致获取失败
    default_value: '55'
    options:
      - '35'
      - '45'
      - '55'
      - '60'
      - '120'

author: Tangleaf
homepage: https://github.com/Tangleaf/Proxy
icon: doc.text.fill

dns: {}

scriptings:
  - schedule:
      name: WPS 签到
      cron: 0 10 * * *
      script_url: https://raw.githubusercontent.com/MaYIHEI/paperclip/main/app/wps/wps.js
      timeout: 120

  - http_response:
      name: WPS 获取 Cookie
      match: ^https:\/\/personal-act\.wps\.cn\/activity-rubik\/activity\/page_info
      script_url: https://raw.githubusercontent.com/MaYIHEI/paperclip/main/app/wps/wps.cookie.js
      timeout: 60
      body_required: false
      binary_body: false

mitm:
  hostnames:
    includes:
      - personal-act.wps.cn
